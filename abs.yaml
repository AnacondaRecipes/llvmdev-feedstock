# Four unit tests crash on big sur builders, but not ventura.
# These tests call /usr/lib/system/libsystem_pthread.dylib
# before crashing.
extra_labels_for_os:
  osx-arm64: [ventura]

# Extend timeout to 4 hours (14400 seconds) for Windows builds
task_timeout: 14400

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Bootstrap build with LLVM 20 compiler
# Upload to stage0, use defaults channel (has llvmdev 20.1.8)
staging_channel_upload_target: llvm-21.1.8-stage0-build-0

# No staging channel needed - defaults has llvmdev 20.1.8
# channels:
#   - https://staging.continuum.io/prefect/llvm-21.1.8-stage0-build-0

aggregate_check: false

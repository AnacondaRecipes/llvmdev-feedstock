# Four unit tests crash on big sur builders, but not ventura.
# These tests call /usr/lib/system/libsystem_pthread.dylib
# before crashing.
extra_labels_for_os:
  osx-arm64: [ventura]

# Extend timeout to 6 hours (21600 seconds) for Windows builds
task_timeout: 21600

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Upload to new staging channel (old one had CDN corruption)
staging_channel_upload_target: llvm22-stage0

aggregate_check: false


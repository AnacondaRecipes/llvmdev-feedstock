# Four unit tests crash on big sur builders, but not ventura.
# These tests call /usr/lib/system/libsystem_pthread.dylib
# before crashing.
extra_labels_for_os:
  osx-arm64: [ventura]

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"
channels:
  - https://staging.continuum.io/preprod-pbp/fs/libxml2-feedstock/pr25/58bfcbc

aggregate_check: false

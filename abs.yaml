# Four unit tests crash on big sur builders, but not ventura.
# These tests call /usr/lib/system/libsystem_pthread.dylib
# before crashing.
extra_labels_for_os:
  osx-arm64: [ventura]

# Extend timeout to 6 hours (21600 seconds) for Windows builds
task_timeout: 21600

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Upload to LLVM 22 staging channel
staging_channel_upload_target: llvm-22.1.2-stage0-build-0

# Stage 0 channel needed for libcxx-devel 22.1.2 (osx/linux only)
# win-64 will get WARNING but should proceed since libcxx-devel has # [osx] selector
channels:
  - https://staging.continuum.io/pbp/llvm-22.1.2-stage0-build-0

aggregate_check: false


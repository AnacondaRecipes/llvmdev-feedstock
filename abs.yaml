# Four unit tests crash on big sur builders, but not ventura.
# These tests call /usr/lib/system/libsystem_pthread.dylib
# before crashing.
extra_labels_for_os:
  osx-arm64: [ventura]

# Extend timeout to 4 hours (14400 seconds) for Windows builds
task_timeout: 14400

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Staging channels needed for LLVM 21 dependencies until promoted to pkgs/main
channels:
  # Stage 2 channel has clang_bootstrap 21
  - https://staging.continuum.io/pbp/llvm-21.1.8-stage2-build-0
  # Stage 0 channel has supporting packages
  - https://staging.continuum.io/pbp/llvm-21.1.8-stage0-build-0

aggregate_check: false


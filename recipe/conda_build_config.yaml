c_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]
cxx_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]

# Stage 0: Bootstrap build with clang 21 compiler (update to 22.1.2 in Stage 2)
c_compiler_version:
  - 21.1.8            # [osx]
cxx_compiler_version:
  - 21.1.8            # [osx]

c_stdlib_version:   # [win]
  - 2022.14         # [win]

# Required for PBP - not included in Python-variant task CBCs
libffi:
  - '3.4'

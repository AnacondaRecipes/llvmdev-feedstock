c_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]
cxx_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]

# Stage 2: Self-hosted build with clang 21 compiler
c_compiler_version:
  - 21.1.8            # [osx]
cxx_compiler_version:
  - 21.1.8            # [osx]

c_stdlib_version:   # [win]
  - 2022.14         # [win]

# Pinnings for PBP (copied from aggregate conda_build_config.yaml)
backtrace:
  - '20241216'
libffi:
  - '3.4'
libxml2:
  - '2.13'
zlib:
  - '1.2'
zstd:
  - '1.5'

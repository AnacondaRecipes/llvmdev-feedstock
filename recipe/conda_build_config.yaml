c_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]
cxx_compiler:
  - clang_bootstrap            # [osx]
  - vs2022                     # [win]

# Note: Must use LLVM 20 compiler because clang_bootstrap 21 doesn't exist yet
# (clang_bootstrap is built from clang-compiler-activation, which depends on clangdev 21)
# Stage 2 just means building against llvmdev 21 stage0, not using LLVM 21 as compiler
c_compiler_version:
  - 20.1.8            # [osx]
cxx_compiler_version:
  - 20.1.8            # [osx]

c_stdlib_version:   # [win]
  - 2022.14         # [win]

# Pinnings for PBP (copied from aggregate conda_build_config.yaml)
backtrace:
  - '20241216'
libffi:
  - '3.4'
libxml2:
  - '2.13'
zlib:
  - '1.2'
zstd:
  - '1.5'
